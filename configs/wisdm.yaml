# WISDM v1.1 — Natural user-based split
dataset: wisdm
data_dir: ./data/wisdm_npz

# Data info
num_clients: 36          # 36 unique users
clients_per_round: 12    # ~33% sampled per round
input_dim: 3             # (x, y, z) accelerometer
num_classes: 6           # Walking, Jogging, Upstairs, Downstairs, Sitting, Standing
window_size: 128
stride: 64
split_type: natural      # Original user-based partition

# Training
r: 100
E: 3
B: 50
lr: 0.01
optimizer: sgd
weight_decay: 0.0001

# Contrastive (CCRA)
contrastive_weight: 0.5
temperature: 0.07
projection_dim: 64
prototype_beta: 0.9
proto_update_strategy: ema
