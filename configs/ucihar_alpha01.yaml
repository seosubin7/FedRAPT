# UCI-HAR — Dirichlet non-IID split (alpha=0.1, extreme heterogeneity)
#
# "alpha=0.1" means Dirichlet concentration parameter alpha=0.1.
# Lower alpha => more skewed label distribution per client (more non-IID).
# At alpha=0.1, most clients hold data from only 1-2 classes.
# Max/Min sample ratio across clients: ~234x
# Average classes per client: 3.4 (out of 6)
dataset: ucihar
data_dir: ./data/ucihar_npz_alpha01

# Data info
num_clients: 30
clients_per_round: 12
input_dim: 3
num_classes: 6
window_size: 128
split_type: dirichlet    # Artificial non-IID partition via Dirichlet distribution
dirichlet_alpha: 0.1     # Concentration parameter (lower = more heterogeneous)
dirichlet_seed: 42       # Seed used during preprocess.py --dirichlet --alpha 0.1

# Training
r: 100
E: 3
B: 50
lr: 0.01
optimizer: sgd
weight_decay: 0.0001

# Contrastive (CCRA)
contrastive_weight: 0.5
temperature: 0.07
projection_dim: 64
prototype_beta: 0.9
proto_update_strategy: ema
